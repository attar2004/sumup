<!DOCTYPE html>
<html>
    <head>
        <title>Login - SumUp</title>
        <link rel="stylesheet" href="css/style.css">
    </head>
    
    <body class="auth-page">

        <div class="auth-box">
            <h2>🔐 Welcome Back</h2>

            <input type="email" id="email" placeholder="Enter Email ✉️"><br>
            <input type="password" id="password" placeholder="Enter Password 🔐"><br>

            <button type="button" onclick="login()">Login 🚀</button>

            <p id="msg"></p>

            <p>New here? <a href="signup.html">Signup 💖</a></p>
        </div>

        <!-- Firebase -->
        <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

        <script>
            const firebaseConfig = {
            apiKey: "AIzaSyCa9SNknAOD769bxK3PRt-_JurbO4-R4KA",
            authDomain: "sumup-app-ea063.firebaseapp.com",
            projectId: "sumup-app-ea063",
            appId: "1:274498903756:web:6c290066fe391ead59ec69"
            };

            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }

            function login() {
                let email = document.getElementById("email").value;
                let password = document.getElementById("password").value;

                firebase.auth().signInWithEmailAndPassword(email, password)
                .then(() => {
                    console.log("Login successful ✅");
                    window.location.href = "index.html";
                })
                .catch(error => {
                    if (error.code === "auth/user-not-found") {
                        document.getElementById("msg").innerText = "❌ No account found. Please signup first.";
                    } else if (error.code === "auth/wrong-password") {
                        document.getElementById("msg").innerText = "❌ Wrong password.";
                    } else {
                        document.getElementById("msg").innerText = error.message;
                    }
                });
            }
        </script>

    </body>
</html>
